name: Tests

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: lifeos
          POSTGRES_PASSWORD: changeme
          POSTGRES_DB: lifeos_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U lifeos"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements-dev.txt

      - name: Run tests
        env:
          TEST_DATABASE_URL: postgresql+psycopg://lifeos:changeme@localhost:5432/lifeos_test
          REDIS_URL: redis://localhost:6379/0
        run: pytest -v
