services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lifeos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-lifeos}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lifeos}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  n8n:
    image: n8nio/n8n:latest
    restart: unless-stopped
    environment:
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: ${N8N_BASIC_AUTH_USER:-admin}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_BASIC_AUTH_PASSWORD:-changeme}
      GENERIC_TIMEZONE: Europe/Warsaw
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n

  app:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://lifeos:changeme@postgres:5432/lifeos}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
    ports:
      - "8000:8000"
    volumes:
      - ./app:/code/app
      - ./alembic:/code/alembic
      - ./alembic.ini:/code/alembic.ini
    depends_on:
      postgres:
        condition: service_healthy

  # DB admin UI for browsing/editing tables directly (see 03-WEBAPP-PLAN.md).
  # Bound to localhost only — never routed through the ngrok tunnel, since
  # Adminer has no auth of its own and raw SQL edit access is a bigger risk
  # than the app itself. Reachable at http://localhost:8081 on this machine
  # or over your home network; use Tailscale if you want it while out.
  adminer:
    image: adminer:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:8081:8080"
    depends_on:
      - postgres

  # ngrok tunnel using a free reserved static domain — stable across
  # restarts (unlike Cloudflare's random Quick Tunnel URL).
  ngrok:
    image: ngrok/ngrok:latest
    restart: unless-stopped
    command: ["http", "--url=${NGROK_STATIC_DOMAIN}", "app:8000"]
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN}
    depends_on:
      - app
    profiles:
      - tunnel

volumes:
  postgres_data:
  redis_data:
  n8n_data:
